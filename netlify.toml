# Netlify — build static Astro. NU se publică fără confirmarea proprietarului.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Securitate de bază (fără a bloca fonturile self-hosted sau Netlify Forms)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# Fonturile self-hosted — cache lung (sunt imuabile, versionate prin nume)
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Rădăcina (apex) NU se mai redirecționează la edge: Netlify servește dist/index.html,
# o pagină care conține etichetele Open Graph (card social pentru linkul scurt cfc-royal.ro)
# și redirecționează instant vizitatorii către /ro/ prin script. Roboții WhatsApp/Facebook
# citesc astfel cardul; un redirect 302 gol i-ar fi lăsat fără previzualizare.

# Redenumire pagină: Școala de Arbitraj → Centrul de Dezvoltare a Competențelor Chinologice
[[redirects]]
  from = "/ro/educatie/scoala-arbitraj/"
  to = "/ro/educatie/centrul-competentelor-chinologice/"
  status = 301
  force = true

[[redirects]]
  from = "/en/educatie/scoala-arbitraj/"
  to = "/en/educatie/centrul-competentelor-chinologice/"
  status = 301
  force = true

# Redenumire secțiune: Afiliați → Asociații membre (slug /afiliati/ → /membrii/)
[[redirects]]
  from = "/ro/afiliati/*"
  to = "/ro/membrii/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/en/afiliati/*"
  to = "/en/membrii/:splat"
  status = 301
  force = true
