# Netlify — build static Astro. NU se publică fără confirmarea proprietarului.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Securitate de bază (fără a bloca fonturile self-hosted sau Netlify Forms)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# Fonturile self-hosted — cache lung (sunt imuabile, versionate prin nume)
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect rădăcină → limba implicită (dublură peste meta-refresh din index.astro)
[[redirects]]
  from = "/"
  to = "/ro/"
  status = 302
