# Netlify — build static Astro. NU se publică fără confirmarea proprietarului.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Securitate de bază (fără a bloca fonturile self-hosted sau Netlify Forms)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# Fonturile self-hosted — cache lung (sunt imuabile, versionate prin nume)
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# === TEMPORAR: pagina „În curând" pe prima pagină. DE ELIMINAT după lansare (1 iulie 2026). ===
# Afișează teaser-ul DOAR pe homepage (/, /ro/, /en/). Restul paginilor rămân accesibile.
[[redirects]]
  from = "/"
  to = "/in-curand/"
  status = 200
  force = true

[[redirects]]
  from = "/ro/"
  to = "/in-curand/"
  status = 200
  force = true

[[redirects]]
  from = "/en/"
  to = "/in-curand/"
  status = 200
  force = true
# === sfârșit bloc TEMPORAR ===

# Redirect rădăcină → limba implicită, la nivel de edge (instant, fără pagina albă de meta-refresh).
# force = true e esențial: altfel Netlify servește dist/index.html în loc să redirecteze.
[[redirects]]
  from = "/"
  to = "/ro/"
  status = 302
  force = true

# Redenumire pagină: Școala de Arbitraj → Centrul de Dezvoltare a Competențelor Chinologice
[[redirects]]
  from = "/ro/educatie/scoala-arbitraj/"
  to = "/ro/educatie/centrul-competentelor-chinologice/"
  status = 301
  force = true

[[redirects]]
  from = "/en/educatie/scoala-arbitraj/"
  to = "/en/educatie/centrul-competentelor-chinologice/"
  status = 301
  force = true

# Redenumire secțiune: Afiliați → Asociații membre (slug /afiliati/ → /membrii/)
[[redirects]]
  from = "/ro/afiliati/*"
  to = "/ro/membrii/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/en/afiliati/*"
  to = "/en/membrii/:splat"
  status = 301
  force = true
